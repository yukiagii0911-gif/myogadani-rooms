<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#FAF6F0">
<title>茗荷谷ビューワー</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <div class="hd-left">
    <div class="hd-logo" data-icon="building" aria-hidden="true"></div>
    <div>
      <div class="hd-title">茗荷谷</div>
      <div class="hd-sub" id="hd-sub">読み込み中…</div>
    </div>
  </div>
  <div class="hd-right">
    <button class="icon-btn" id="btn-search" aria-label="検索" data-icon="search"></button>
    <button class="icon-btn" id="btn-profile" aria-label="マイページ" data-icon="account"></button>
  </div>
</header>

<main class="app-main">

  <!-- 階ピル＋現在時刻表示 -->
  <section class="top-bar">
    <button class="pill pill-floor" data-picker="floor" aria-haspopup="dialog">
      <span class="pill-label">階</span>
      <span class="pill-value" id="pv-floor">全階</span>
      <span class="pill-caret" data-icon="chevron-down"></span>
    </button>
    <div class="now-summary" id="now-summary">
      <span class="now-line" id="now-line">読み込み中…</span>
    </div>
  </section>

  <!-- 表示モード切替 -->
  <section class="view-toggle-wrap">
    <div class="view-toggle" role="tablist" aria-label="表示モード">
      <button class="vt-btn on" data-view="list" role="tab" aria-selected="true">
        <span data-icon="list"></span><span>リスト</span>
      </button>
      <button class="vt-btn" data-view="map" role="tab" aria-selected="false">
        <span data-icon="map"></span><span>マップ</span>
      </button>
    </div>
  </section>

  <!-- リスト/マップ表示 -->
  <section class="content" id="content"></section>

</main>

<!-- 詳細パネル（教室詳細） -->
<aside class="sheet" id="detail-sheet" aria-hidden="true">
  <div class="sheet-backdrop" data-close-sheet="detail-sheet"></div>
  <div class="sheet-body" role="dialog" aria-labelledby="sheet-title">
    <div class="sheet-handle"></div>
    <div class="sheet-content" id="sheet-content"></div>
  </div>
</aside>

<!-- ピッカーシート（階・曜日・時限・学期・フィルタの選択用） -->
<aside class="sheet picker-sheet" id="picker-sheet" aria-hidden="true">
  <div class="sheet-backdrop" data-close-sheet="picker-sheet"></div>
  <div class="sheet-body" role="dialog" aria-labelledby="picker-title">
    <div class="sheet-handle"></div>
    <div class="picker-head">
      <div class="picker-title" id="picker-title">選択</div>
      <button class="icon-btn icon-btn-sm" data-close-sheet="picker-sheet" aria-label="閉じる" data-icon="close"></button>
    </div>
    <div class="picker-options" id="picker-options"></div>
  </div>
</aside>

<!-- フッターナビ -->
<nav class="app-footer">
  <button class="foot-btn on" data-tab="rooms">
    <span data-icon="building"></span><span>教室</span>
  </button>
  <button class="foot-btn" data-tab="friends">
    <span data-icon="account-plus"></span><span>友達</span>
  </button>
  <button class="foot-btn" data-tab="notifications">
    <span data-icon="bell"></span><span>通知</span>
  </button>
  <button class="foot-btn" data-tab="me">
    <span data-icon="account"></span><span>マイ</span>
  </button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
