<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#FAF6F0">
<title>茗荷谷ビューワー</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="茗荷谷">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="style.css?v=20260619a">
</head>
<body>

<header class="app-header">
  <div class="hd-left">
    <div class="hd-logo" data-icon="building" aria-hidden="true"></div>
    <div>
      <div class="hd-title">茗荷谷</div>
      <div class="hd-sub" id="hd-sub">読み込み中…</div>
    </div>
  </div>
  <div class="hd-right">
    <button class="icon-btn" id="btn-search" aria-label="教室を検索" data-icon="search"></button>
  </div>
</header>

<main class="app-main" data-tab-content="rooms">

  <!-- 階ピル＋現在時刻表示 -->
  <section class="top-bar">
    <button class="pill pill-floor" data-picker="floor" aria-haspopup="dialog">
      <span class="pill-label">階</span>
      <span class="pill-value" id="pv-floor">全階</span>
      <span class="pill-caret" data-icon="chevron-down"></span>
    </button>
    <div class="now-summary" id="now-summary">
      <span class="now-line" id="now-line">読み込み中…</span>
    </div>
  </section>

  <!-- 表示モード切替 -->
  <section class="view-toggle-wrap">
    <div class="view-toggle" role="tablist" aria-label="表示モード">
      <button class="vt-btn on" data-view="list" role="tab" aria-selected="true">
        <span data-icon="list"></span><span>リスト</span>
      </button>
      <button class="vt-btn" data-view="map" role="tab" aria-selected="false">
        <span data-icon="map"></span><span>マップ</span>
      </button>
    </div>
  </section>

  <!-- リスト/マップ表示 -->
  <section class="content" id="content"></section>

</main>

<!-- 友達詳細シート (共通授業一覧 + フル時間割を見るボタン) -->
<aside class="sheet friend-sheet" id="friend-sheet" aria-hidden="true">
  <div class="sheet-backdrop" data-close-sheet="friend-sheet"></div>
  <div class="sheet-body" role="dialog">
    <div class="sheet-handle"></div>
    <div class="picker-head">
      <div class="picker-title" id="friend-sheet-title">友達詳細</div>
      <button class="icon-btn icon-btn-sm" data-close-sheet="friend-sheet" aria-label="閉じる" data-icon="close"></button>
    </div>
    <div class="friend-detail" id="friend-detail"></div>
    <div class="friend-actions">
      <button class="btn-primary" id="btn-friend-view-tt">スケジュール表を見る</button>
      <button class="btn-secondary" id="btn-friend-unfollow">フォロー解除</button>
    </div>
  </div>
</aside>

<!-- 友達スケジュール表シート -->
<aside class="sheet friend-tt-sheet" id="friend-tt-sheet" aria-hidden="true">
  <div class="sheet-backdrop" data-close-sheet="friend-tt-sheet"></div>
  <div class="sheet-body" role="dialog">
    <div class="sheet-handle"></div>
    <div class="picker-head">
      <div class="picker-title" id="friend-tt-title">時間割</div>
      <button class="icon-btn icon-btn-sm" data-close-sheet="friend-tt-sheet" aria-label="閉じる" data-icon="close"></button>
    </div>
    <div class="friend-tt-body" id="friend-tt-body"></div>
  </div>
</aside>

<!-- セル詳細シート (マイのスケジュール表で埋まったセルをタップした時) -->
<aside class="sheet cell-detail-sheet" id="cell-detail-sheet" aria-hidden="true">
  <div class="sheet-backdrop" data-close-sheet="cell-detail-sheet"></div>
  <div class="sheet-body" role="dialog">
    <div class="sheet-handle"></div>
    <div class="picker-head">
      <div class="picker-title" id="cell-detail-title">授業詳細</div>
      <button class="icon-btn icon-btn-sm" data-close-sheet="cell-detail-sheet" aria-label="閉じる" data-icon="close"></button>
    </div>
    <div class="cell-detail-body" id="cell-detail-body"></div>
    <div class="friend-actions">
      <button class="btn-danger" id="btn-cell-delete">この授業を時間割から削除</button>
    </div>
  </div>
</aside>

<!-- 教室検索シート (ヘッダの検索ボタン用) -->
<aside class="sheet" id="search-sheet" aria-hidden="true">
  <div class="sheet-backdrop" data-close-sheet="search-sheet"></div>
  <div class="sheet-body" role="dialog">
    <div class="sheet-handle"></div>
    <div class="picker-head">
      <div class="picker-title">教室を検索</div>
      <button class="icon-btn icon-btn-sm" data-close-sheet="search-sheet" aria-label="閉じる" data-icon="close"></button>
    </div>
    <div class="course-search">
      <input type="text" id="room-search-input" placeholder="教室番号 (例: 1W01, B1C16) で検索" autocomplete="off">
    </div>
    <ul class="course-results" id="room-search-results">
      <li class="empty-state">教室番号を入力してください</li>
    </ul>
  </div>
</aside>

<!-- コース検索シート (時間割登録用) -->
<aside class="sheet course-picker-sheet" id="course-picker" aria-hidden="true">
  <div class="sheet-backdrop" data-close-sheet="course-picker"></div>
  <div class="sheet-body" role="dialog">
    <div class="sheet-handle"></div>
    <div class="picker-head">
      <div class="picker-title">時間割に追加</div>
      <button class="icon-btn icon-btn-sm" data-close-sheet="course-picker" aria-label="閉じる" data-icon="close"></button>
    </div>
    <div class="course-search">
      <input type="text" id="course-search-input" placeholder="コース名で検索 (例: 民法)" autocomplete="off">
    </div>
    <ul class="course-results" id="course-results">
      <li class="empty-state">コース名を入力してください</li>
    </ul>
  </div>
</aside>

<!-- ============== 友達タブ ============== -->
<main class="app-main tab-friends" data-tab-content="friends" hidden>
  <section class="page-head">
    <h1 class="page-title">友達</h1>
    <p class="page-sub">フォロー中の人と共通授業</p>
  </section>
  <section class="auth-loading" id="friends-loading">
    <p>読み込み中…</p>
  </section>
  <section class="auth-gate" id="friends-auth-gate" hidden>
    <p>ログインすると友達の時間割と共通授業が見られます</p>
    <button class="btn-google" id="btn-login-from-friends">
      <span data-icon="account"></span>Google でログイン
    </button>
  </section>
  <section class="friends-body" id="friends-body" hidden>
    <div class="follow-add">
      <input type="text" id="follow-input" placeholder="ユーザー名で検索" autocomplete="off">
      <button id="btn-follow-search">追加</button>
    </div>
    <ul class="friend-list" id="friend-list">
      <li class="empty-state">まだ誰もフォローしていません</li>
    </ul>
  </section>
</main>

<!-- ============== マイタブ ============== -->
<main class="app-main tab-me" data-tab-content="me" hidden>
  <section class="page-head">
    <h1 class="page-title">マイ</h1>
  </section>
  <section class="auth-loading" id="me-loading">
    <p>読み込み中…</p>
  </section>
  <section class="auth-gate" id="me-auth-gate" hidden>
    <p>ログインして自分の時間割を登録すると、共通授業を取ってる友達が見つけられます</p>
    <button class="btn-google" id="btn-login-from-me">
      <span data-icon="account"></span>Google でログイン
    </button>
  </section>
  <section class="me-body" id="me-body" hidden>
    <div class="me-profile">
      <img class="me-avatar" id="me-avatar" alt="">
      <div class="me-info">
        <div class="me-displayname" id="me-displayname"></div>
      </div>
      <button class="btn-text" id="btn-logout">ログアウト</button>
    </div>
    <div class="me-section">
      <div class="me-section-head">
        <span class="me-section-label">ユーザー名</span>
        <span class="me-section-value" id="me-username-inline">未設定</span>
        <button class="btn-text" id="btn-edit-username">変更</button>
      </div>
      <p class="me-section-hint" id="me-username-hint">他の人があなたをフォローするときに使う名前。一意である必要があります。</p>
    </div>
    <div class="me-section">
      <div class="me-section-head">
        <span>時間割</span>
        <button class="btn-text" id="btn-add-course">＋追加</button>
      </div>
      <div class="timetable-list" id="timetable-list">
        <div class="empty-state">まだ授業を登録していません</div>
      </div>
    </div>
  </section>
</main>

<!-- 詳細パネル（教室詳細） -->
<aside class="sheet" id="detail-sheet" aria-hidden="true">
  <div class="sheet-backdrop" data-close-sheet="detail-sheet"></div>
  <div class="sheet-body" role="dialog" aria-labelledby="sheet-title">
    <div class="sheet-handle"></div>
    <div class="sheet-content" id="sheet-content"></div>
  </div>
</aside>

<!-- ピッカーシート（階・曜日・時限・学期・フィルタの選択用） -->
<aside class="sheet picker-sheet" id="picker-sheet" aria-hidden="true">
  <div class="sheet-backdrop" data-close-sheet="picker-sheet"></div>
  <div class="sheet-body" role="dialog" aria-labelledby="picker-title">
    <div class="sheet-handle"></div>
    <div class="picker-head">
      <div class="picker-title" id="picker-title">選択</div>
      <button class="icon-btn icon-btn-sm" data-close-sheet="picker-sheet" aria-label="閉じる" data-icon="close"></button>
    </div>
    <div class="picker-options" id="picker-options"></div>
  </div>
</aside>

<!-- フッターナビ (3タブ: 教室 / 友達 / マイ) -->
<nav class="app-footer">
  <button class="foot-btn on" data-tab="rooms">
    <span data-icon="building"></span><span>教室</span>
  </button>
  <button class="foot-btn" data-tab="friends">
    <span data-icon="account-plus"></span><span>友達</span>
  </button>
  <button class="foot-btn" data-tab="me">
    <span data-icon="account"></span><span>マイ</span>
  </button>
</nav>

<!-- Firebase SDK (v10 ESM) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
  import { initializeFirestore, persistentLocalCache, doc, getDoc, setDoc, collection, query, where, getDocs, deleteDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCoJe4EJdZZeiBhAPP7RQ5OvQlqlKEREC0",
    authDomain: "myogadani-room.firebaseapp.com",
    projectId: "myogadani-room",
    storageBucket: "myogadani-room.firebasestorage.app",
    messagingSenderId: "147282304997",
    appId: "1:147282304997:web:7b1f256f76613513e5990c",
    measurementId: "G-77T9CM9PF6"
  };

  const app = initializeApp(firebaseConfig);
  // 永続キャッシュ (IndexedDB) で書き込みを保留 → ネット復帰で自動同期
  // これにより unavailable で UI 表示後にリロードでデータが消える問題が解消される
  let db;
  try {
    db = initializeFirestore(app, { localCache: persistentLocalCache({}) });
  } catch (e) {
    // 既に初期化済みなど(複数タブで起こりうる)はフォールバック
    console.warn("[firestore] persistent cache init failed, fallback:", e?.message);
    db = initializeFirestore(app, {});
  }
  // app.js から使えるよう window 経由で公開
  window.__firebase = {
    auth: getAuth(app),
    db,
    googleProvider: new GoogleAuthProvider(),
    fns: { signInWithPopup, signOut, onAuthStateChanged, doc, getDoc, setDoc, collection, query, where, getDocs, deleteDoc, serverTimestamp, onSnapshot },
  };
  // 既に app.js がロード済みで初期化待ちなら通知
  if (typeof window.__onFirebaseReady === "function") window.__onFirebaseReady();
</script>

<script type="module" src="app.js?v=20260619a"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch((e) => console.warn("[sw] register failed", e));
    });
  }
</script>
</body>
</html>
