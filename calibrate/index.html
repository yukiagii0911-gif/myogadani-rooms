<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#FAF6F0">
<title>キャリブレーション</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/konva@9.3.20/konva.min.js"></script>
</head>
<body>

<header class="cal-head">
  <div class="hd-title">教室キャリブレーション</div>
  <button class="hd-export" id="btn-export">JSONコピー</button>
</header>

<div class="cal-hint" id="cal-hint">B1・1F は手本済み。他の階の教室を配置してください</div>

<div class="floor-tabs" id="floor-tabs"></div>

<section class="image-section">
  <div class="image-wrap" id="image-wrap">
    <div class="image-empty" id="image-empty" hidden>
      <p id="image-empty-msg">読み込み中…</p>
    </div>
    <div id="konva-container"></div>
  </div>
</section>

<section class="active-room">
  <div class="ar-info">
    <div class="ar-name" id="ar-name">教室を選んで →</div>
    <div class="ar-status" id="ar-status">タップで配置</div>
  </div>
  <div class="ar-actions" id="ar-actions" hidden>
    <button id="btn-delete">削除</button>
    <button id="btn-next" class="primary">次へ →</button>
  </div>
</section>

<aside class="room-list">
  <div class="rl-head">
    <span>教室一覧</span>
    <button id="btn-add-custom" class="rl-add">+ 追加</button>
  </div>
  <ul id="room-list"></ul>
</aside>

<div class="toast" id="toast"></div>

<script type="module" src="app.js?v=20260614i"></script>
</body>
</html>
